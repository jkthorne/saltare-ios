name: Saltare
options:
  bundleIdPrefix: ai.saltare
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  SaltareHUD:
    path: Packages/SaltareHUD
  SaltareKit:
    path: Packages/SaltareKit

targets:
  Saltare:
    type: application
    platform: iOS
    sources:
      - path: Saltare
    dependencies:
      - package: SaltareHUD
      - package: SaltareKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.saltare.app
        PRODUCT_NAME: Saltare
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: saltare
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # Dark is the system's identity; lock the UIKit chrome to it too.
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
