name: Saltare
options:
  bundleIdPrefix: ai.saltare
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  SaltareHUD:
    path: Packages/SaltareHUD
  SaltareKit:
    path: Packages/SaltareKit
  SaltareAgent:
    path: Packages/SaltareAgent
  SaltareWorkspace:
    path: Packages/SaltareWorkspace

targets:
  Saltare:
    type: application
    platform: iOS
    sources:
      - path: Saltare
    dependencies:
      - package: SaltareHUD
      - package: SaltareKit
      - package: SaltareAgent
      - package: SaltareWorkspace
      - target: SaltareWidgets       # embed the widget/control extension
    info:
      path: Saltare/Info.plist
      properties:
        CFBundleDisplayName: saltare
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        # Dark is the system's identity; lock the UIKit chrome to it too.
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "saltare searches your contacts so you can call or message them straight from the universal input."
        NSCalendarsUsageDescription: "saltare reads and adds calendar events when you ask the agent about your schedule."
        NSCalendarsFullAccessUsageDescription: "saltare reads and adds calendar events when you ask the agent about your schedule."
        # canOpenURL probes the curated catalog (iOS can't enumerate apps).
        LSApplicationQueriesSchemes:
          - music
          - maps
          - spotify
          - youtube
          - whatsapp
          - slack
          - github
          - googlegmail
          - tg
          - things
        # Deep links from the widget (saltare://search?q=…).
        CFBundleURLTypes:
          - CFBundleURLName: ai.saltare.app
            CFBundleURLSchemes:
              - saltare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.saltare.app
        PRODUCT_NAME: Saltare
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES

  SaltareWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SaltareWidgets
    dependencies:
      - package: SaltareHUD
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: SaltareWidgets/Info.plist
      properties:
        CFBundleDisplayName: saltare
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.saltare.app.widgets
        PRODUCT_NAME: SaltareWidgets
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
